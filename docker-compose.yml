version: '3'

services:
  verance-scada-studio:
    build: .
    image: verance-scada-studio:dev
    container_name: verance-scada-studio
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__database__PATH=/data/gitea/gitea.db
      - GITEA__repository__ROOT=/data/git/repositories
      - GITEA__server__ROOT_URL=http://localhost:3000/
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__SSH_PORT=2222
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - ./data:/data
      - ./git:/data/git
      - ../rtac-plg:/mnt/host/rtac-plg
      - "C:/Program Files/SEL/AcSELerator/RTAC:/mnt/host/acrtac"
    restart: unless-stopped
    networks:
      - gitea

networks:
  gitea:
    driver: bridge
